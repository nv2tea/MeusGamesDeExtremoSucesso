    // 2. LÓGICA DE PERSISTÊNCIA (LocalStorage)
    // Tenta carregar dados salvos, se não houver, usa a listaOriginal
    let dadosUsuario = JSON.parse(localStorage.getItem('meusJogosDados')) || {};

    function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';

        listaOriginal.forEach((jogo, index) => {
            const infoSalva = dadosUsuario[index] || { status: 'espera', inicio: '-', fim: '-' };
            
            const tr = document.createElement('tr');
            tr.className = `status-${infoSalva.status}`;
            
            tr.innerHTML = `
                <td><strong>${jogo.nome}</strong></td>
                <td>${jogo.adquirido}</td>
                <td>
                    <select onchange="alterarStatus(${index}, this.value)">
                        <option value="espera" ${infoSalva.status === 'espera' ? 'selected' : ''}>Uma hora eu jogo</option>
                        <option value="jogando" ${infoSalva.status === 'jogando' ? 'selected' : ''}>Jogando</option>
                        <option value="zerado" ${infoSalva.status === 'zerado' ? 'selected' : ''}>Zerado</option>
                    </select>
                </td>
                <td>
                    <span class="data-info">Início: ${infoSalva.inicio}</span>
                    <span class="data-info">Zerei: ${infoSalva.fim}</span>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    // 3. FUNÇÃO PARA ATUALIZAR STATUS E DATAS
    window.alterarStatus = function(index, novoStatus) {
        const hoje = new Date().toLocaleDateString('pt-BR');
        
        if (!dadosUsuario[index]) dadosUsuario[index] = { status: 'espera', inicio: '-', fim: '-' };
        
        dadosUsuario[index].status = novoStatus;

        if (novoStatus === 'jogando' && dadosUsuario[index].inicio === '-') {
            dadosUsuario[index].inicio = hoje;
        } else if (novoStatus === 'zerado' && dadosUsuario[index].fim === '-') {
            dadosUsuario[index].fim = hoje;
        }

        // Salva no navegador
        localStorage.setItem('meusJogosDados', JSON.stringify(dadosUsuario));
        renderizarTabela(); // Atualiza a tela
    };

    // Iniciar a página
    renderizarTabela();
</script>
